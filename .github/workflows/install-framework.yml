name: Install Android Framework

on:
  workflow_dispatch:
    inputs:
      apktool_release_tag:
        description: 'Apktool release tag to download (e.g. v3.0.2). Leave empty to download from latest release.'
        required: false
        type: string

permissions:
  contents: read

jobs:
  install-framework:
    runs-on: ubuntu-latest
    name: Download apktool and install Android 16 framework
    steps:
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Download apktool from latest release
        id: obtain_jar
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/apktool-download
          if [ -n "${{ inputs.apktool_release_tag }}" ]; then
            echo "Downloading apktool from release ${{ inputs.apktool_release_tag }}..."
            gh release download "${{ inputs.apktool_release_tag }}" \
              --repo "${{ github.repository }}" \
              --pattern "apktool-*.jar" --dir /tmp/apktool-download
          else
            echo "Downloading apktool from latest release..."
            gh release download --repo "${{ github.repository }}" \
              --pattern "apktool-*.jar" --dir /tmp/apktool-download
          fi
          JAR_PATH=$(find /tmp/apktool-download -name "apktool-*.jar" | head -1)
          if [ -z "$JAR_PATH" ]; then
            echo "::error::Failed to download apktool JAR from release"
            exit 1
          fi
          echo "jar_path=$JAR_PATH" >> "$GITHUB_OUTPUT"
          echo "Downloaded apktool: $JAR_PATH"

      - name: Download Android 16 framework (API 36)
        run: |
          sudo apt-get update && sudo apt-get install -y wget unzip
          mkdir -p /tmp/android-sdk
          # Download Android SDK command-line tools (update URL when newer versions are released)
          CMDLINE_TOOLS_URL="https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          wget -q "$CMDLINE_TOOLS_URL" -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/android-sdk/cmdline-tools
          mv /tmp/android-sdk/cmdline-tools/cmdline-tools /tmp/android-sdk/cmdline-tools/latest
          export ANDROID_HOME=/tmp/android-sdk
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-36"
          FRAMEWORK_PATH="$ANDROID_HOME/platforms/android-36/android.jar"
          echo "Framework downloaded at: $FRAMEWORK_PATH"
          ls -la "$FRAMEWORK_PATH"

      - name: Install framework into apktool
        run: |
          ANDROID_HOME=/tmp/android-sdk
          FRAMEWORK_PATH="$ANDROID_HOME/platforms/android-36/android.jar"
          java -jar "${{ steps.obtain_jar.outputs.jar_path }}" install-framework "$FRAMEWORK_PATH"
          echo "Android 16 framework installed successfully."

      - name: Upload apktool with framework
        uses: actions/upload-artifact@v7
        with:
          name: apktool-with-framework
          path: ${{ steps.obtain_jar.outputs.jar_path }}
